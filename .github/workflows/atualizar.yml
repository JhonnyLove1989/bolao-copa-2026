name: 🏆 Bolão Copa 2026 - Atualização Automática

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório LIMPO
        run: |
          git clone https://github.com/JhonnyLove1989/bolao-copa-2026.git repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Instalar Python
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip

          pip3 install requests

          # Rodar seu script
          python3 atualizar_bolao.py

          # Commit direto SEM merge
          git add games.json ranking.json palpites.json palpites_mm.json
          git commit -m "🔄 Atualização automática dos resultados" || echo "Sem mudanças"

          # PUSH FORÇADO (sem histórico, sem conflito)
          git push origin main --force
