name: 🏆 Bolão Copa 2026 - Atualização Automática

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 🔄 Rodar atualização
        run: python atualizar_bolao.py
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: 🚀 Commit e Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json ranking.json palpites.json palpites_mm.json
          git diff --staged --quiet || (
            git commit -m "🔄 Atualização automática dos resultados"
            git pull --rebase origin main
            git push origin main
          )
