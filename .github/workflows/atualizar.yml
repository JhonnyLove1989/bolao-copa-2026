name: 🏆 Bolão Copa 2026 - Atualização Automática

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Clonar repo com autenticação
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/JhonnyLove1989/bolao-copa-2026.git repo

      - name: 🐍 Instalar Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests

      - name: 🔄 Rodar script
        run: |
          cd repo
          python3 atualizar_bolao.py
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: 🚀 Commit e Push autorizado
        run: |
          cd repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add games.json ranking.json palpites.json palpites_mm.json

          git commit -m "🔄 Atualização automática dos resultados" || echo "Sem alteração"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/JhonnyLove1989/bolao-copa-2026.git main
