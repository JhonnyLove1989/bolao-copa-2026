name: 🏆 Bolão Copa 2026 - Atualização Automática

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout LIMPO
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 🔄 Executar script Python
        run: python atualizar_bolao.py
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: 🚀 Commit e Push SEM CONFLITO FINAL
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 🔥 REMOVE COMPLETAMENTE HISTÓRICO DE GIT (CHAVE DA SOLUÇÃO)
          rm -rf .git

          # 🔥 RECRIA REPOSITÓRIO LIMPO
          git init
          git remote add origin https://github.com/JhonnyLove1989/bolao-copa-2026.git
          git checkout -b main

          # ✅ ADICIONA ARQUIVOS ATUALIZADOS
          git add games.json ranking.json palpites.json palpites_mm.json

          # ✅ COMMIT
          git commit -m "🔄 Atualização automática dos resultados"

          # ✅ PUSH FORÇADO (SEM MERGE / SEM CONFLITO)
          git push origin main --force
