name: Atualizar jogos Copa

on:
  schedule:
    - cron: "*/15 * * * *"  # a cada 15 min
  workflow_dispatch:       # botão manual

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar script
        run: python update_games.py

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add games.json
          git commit -m "Atualizando jogos automaticamente" || echo "Sem mudanças"
          git push
